services:
  broker:
    image: apache/kafka:latest
    ports:
      - 9092:9092
    volumes:
      - kafka:/var/lib/kafka/data
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://broker:29092,PLAINTEXT_HOST://127.0.0.1:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_NODE_ID: 1
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@broker:29093
      KAFKA_LISTENERS: PLAINTEXT://broker:29092,CONTROLLER://broker:29093,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk

  bank:
    image: exilesprx/blockchain:bank-${APP_VERSION:-latest}
    container_name: bank
    ports:
      - '3000:3000'
      - '9229:9229'
    depends_on:
      - eventstore.db
      - broker
    environment:
      APP_PORT: ${APP_PORT:?}
      APP_NAME: ${APP_NAME:-blockchain}
      APP_ENV: ${APP_ENV:-dev}
      DB_HOST: eventstore
      DB_PORT: ${EVENTSTORE_HTTP_PORT:?}
      DB_INSECURE: ${EVENTSTORE_INSECURE:?}
      KAFKA_GROUP_ID: ${KAFKA_GROUP_ID:?}
      KAFKA_CLIENT_ID: ${KAFKA_CLIENT_ID:?}
      KAFKA_HOST: broker
      KAFKA_PORT: 29092
      # GRAYLOG_HOST: graylog
      # GRAYLOG_PORT: 12201
    command: pnpm run app:bank

  miner:
    image: exilesprx/blockchain:miner-${APP_VERSION:-latest}
    container_name: miner
    ports:
      - '9230:9229'
    depends_on:
      - broker
    environment:
      APP_PORT: ${APP_PORT:?}
      APP_NAME: ${APP_NAME:-blockchain}
      APP_ENV: ${APP_ENV:-dev}
      DB_HOST: eventstore
      DB_PORT: ${EVENTSTORE_HTTP_PORT:?}
      DB_INSECURE: ${EVENTSTORE_INSECURE:?}
      KAFKA_GROUP_ID: ${KAFKA_GROUP_ID:?}
      KAFKA_CLIENT_ID: ${KAFKA_CLIENT_ID:?}
      KAFKA_HOST: broker
      KAFKA_PORT: 29092
      # GRAYLOG_HOST: graylog
      # GRAYLOG_PORT: 12201
    command: pnpm run app:miner

  eventstore.db:
    image: eventstore/eventstore:24.10
    env_file:
      - .env
    ports:
      - '1113:1113'
      - '2113:2113'
    volumes:
      - type: volume
        source: eventstore-volume-data
        target: /var/lib/eventstore
      - type: volume
        source: eventstore-volume-logs
        target: /var/log/eventstore

volumes:
  kafka:
  eventstore-volume-data:
  eventstore-volume-logs:
